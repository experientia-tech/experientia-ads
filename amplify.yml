version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - npm ci
        # app/generated/prisma is gitignored, so the client must be generated on every build
        - npx prisma generate
        # Apply any pending DB migrations to the production database (needs DATABASE_URL)
        - npx prisma migrate deploy
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
