# Applies pending Prisma migrations to the production RDS database.
# Runs separately from the Lambda runtime — never run migrations inside the function.
# Requires repo secret PROD_DATABASE_URL (Settings → Secrets and variables → Actions).
name: DB migrate (production)

on:
  workflow_dispatch: # run manually from the Actions tab
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy
